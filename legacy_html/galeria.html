  <script type="application/ld+json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0d0d0b;
      --paper: #f5f2ed;
      --bone: #e8e3da;
      --ash: #9a9690;
      --char: #1c1b18;
      --mist: #ccc8c0;
      --accent: #f5f5e9;
      --f-serif: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --f-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --f-mono: 'DM Mono', 'Courier New', monospace;
      --fs-label: 0.62rem;
      --fs-body: 0.9rem;
      --fs-micro: 0.58rem;
      --ls-label: 0.3em;
      --ls-wide: 0.4em;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--f-sans);
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--paper);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, opacity 0.2s;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 0.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.25s ease, width 0.2s, height 0.2s, opacity 0.2s;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
    }
    .nav-logo {
      font-family: 'Marion', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: var(--ls-wide);
      color: var(--paper);
      text-decoration: none;
      text-transform: uppercase;
    }
    .nav-links {
      display: flex;
      gap: 3rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--f-mono);
      font-size: var(--fs-label);
      letter-spacing: var(--ls-label);
      color: var(--ash);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--paper); }

    /* PAGE HEADER */
    .page-header {
      padding: 14rem 4rem 4rem;
      border-bottom: 0.5px solid rgba(245,242,237,0.1);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .page-eyebrow {
      font-family: var(--f-mono);
      font-size: var(--fs-label);
      letter-spacing: var(--ls-wide);
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeup 1s 0.3s forwards;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .page-eyebrow::before {
      content: '';
      display: block;
      width: 24px; height: 0.5px;
      background: var(--accent);
    }
    .page-title {
      font-family: var(--f-serif);
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--paper);
      opacity: 0;
      animation: fadeup 1.2s 0.5s forwards;
    }

    /* GALLERY */
    .gallery-section {
      padding: 4rem;
    }
    .gallery-grid {
      columns: 4;
      column-gap: 1rem;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      filter: grayscale(0.15);
      transition: transform 0.6s ease, filter 0.4s;
    }
    .gallery-item:hover img {
      transform: scale(1.04);
      filter: grayscale(0);
    }
    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,11,0);
      transition: background 0.4s;
      display: flex;
      align-items: flex-end;
      padding: 1.2rem;
    }
    .gallery-item:hover .gallery-item-overlay {
      background: rgba(13,13,11,0.35);
    }
    .gallery-item-label {
      font-family: var(--f-mono);
      font-size: var(--fs-micro);
      letter-spacing: var(--ls-label);
      color: var(--paper);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .gallery-item:hover .gallery-item-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,11,0.92);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .lightbox.show { opacity: 1; pointer-events: auto; }
    .lightbox img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: 2rem; right: 3rem;
      font-family: var(--f-mono);
      font-size: var(--fs-label);
      letter-spacing: var(--ls-label);
      color: var(--ash);
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
    }
    .lightbox-close:hover { color: var(--paper); }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--f-sans);
      font-size: 2rem;
      font-weight: 300;
      color: var(--ash);
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
      padding: 1rem;
    }
    .lightbox-nav:hover { color: var(--paper); }
    .lightbox-prev { left: 2rem; }
    .lightbox-next { right: 2rem; }

    /* FOOTER */
    footer {
      border-top: 0.5px solid rgba(245,242,237,0.08);
      padding: 3rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo {
      font-family: var(--f-mono);
      font-size: var(--fs-label);
      letter-spacing: var(--ls-wide);
      color: var(--ash);
      text-transform: uppercase;
    }
    .footer-info {
      font-family: var(--f-mono);
      font-size: var(--fs-micro);
      letter-spacing: var(--ls-label);
      color: var(--ash);
      text-align: right;
      line-height: 1.9;
    }
    .footer-info a { color: var(--ash); text-decoration: none; transition: color 0.3s; }
    .footer-info a:hover { color: var(--paper); }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 1200px) {
      .gallery-grid { columns: 3; }
    }
    @media (max-width: 768px) {
      nav { padding: 1.5rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .page-header { padding: 10rem 1.5rem 3rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
      .gallery-section { padding: 2rem 1.5rem; }
      .gallery-grid { columns: 2; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; }
      .footer-info { text-align: center; }
      .lightbox-nav { display: none; }
    }
    @media (max-width: 480px) {
      .gallery-grid { columns: 1; }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="index.html" class="nav-logo">Ante</a>
  <ul class="nav-links">
    <li><a href="galeria.html" class="active">Galería</a></li>
    <li><a href="nosotros.html">Nosotros</a></li>
    <li><a href="contacto.html">Contacto</a></li>
    <li><a href="clientes.html">Clientes</a></li>
    <li><a href="mas.html">Más</a></li>
  </ul>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div>
    <p class="page-eyebrow">Trabajo reciente</p>
    <h1 class="page-title">Galería</h1>
  </div>
</div>

<!-- GALLERY -->
<section class="gallery-section">
  <div class="gallery-grid" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <span class="lightbox-close" id="lightboxClose">Cerrar ×</span>
  <span class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</span>
  <img id="lightboxImg" src="" alt="">
  <span class="lightbox-nav lightbox-next" id="lightboxNext">›</span>
</div>

<footer>
  <div class="footer-logo">A N T E · Estudio de Fotografía</div>
  <div class="footer-info">
    <a href="mailto:contacto@ante.photo">contacto@ante.photo</a><br>
    Ciudad de México · México
  </div>
</footer>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      ring.style.width = '56px';
      ring.style.height = '56px';
      ring.style.borderColor = 'rgba(200,184,154,0.6)';
    });
    el.addEventListener('mouseleave', () => {
      ring.style.width = '36px';
      ring.style.height = '36px';
      ring.style.borderColor = 'var(--accent)';
    });
  });

  // Gallery images
  const images = [
    { src: 'img/thumb/Ricardo1.jpg', alt: 'Retrato profesional · Ricardo' },
    { src: 'img/thumb/Ricardo2.jpg', alt: 'Retrato editorial · Ricardo' },
    { src: 'img/thumb/Jona1.jpg',    alt: 'Retrato profesional · Jonathan' },
    { src: 'img/thumb/Jona3.jpg',    alt: 'Retrato corporativo · Jonathan' },
    { src: 'img/thumb/Valeria1.jpg', alt: 'Retrato profesional · Valeria' },
    { src: 'img/thumb/Mafer2.jpg',   alt: 'Retrato personal · Mafer' },
    { src: 'img/thumb/Carlos1.jpg',  alt: 'Retrato corporativo · Carlos' },
    { src: 'img/thumb/Carlos2.jpg',  alt: 'Retrato profesional · Carlos' },
    { src: 'img/thumb/Carlos3.jpg',  alt: 'Retrato editorial · Carlos' },
    { src: 'img/thumb/Mich1.jpg',    alt: 'Retrato artístico · Michelle' },
    { src: 'img/thumb/Mich4.jpg',    alt: 'Retrato personal · Michelle' },
    { src: 'img/thumb/Christian1.jpg', alt: 'Retrato profesional · Christian' },
    { src: 'img/thumb/Christian3.jpg', alt: 'Retrato editorial · Christian' },
  ];

  // Shuffle
  for (let i = images.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [images[i], images[j]] = [images[j], images[i]];
  }

const gallery = document.getElementById('gallery');
  const thumbPath = p => p;
  let currentIndex = 0;

  images.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';

    const el = document.createElement('img');
    el.src = thumbPath(img.src);
    el.onerror = () => { el.src = img.src; };
    el.alt = img.alt;
    el.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'gallery-item-overlay';
    const label = document.createElement('span');
    label.className = 'gallery-item-label';
    label.textContent = img.alt;
    overlay.appendChild(label);

    item.appendChild(el);
    item.appendChild(overlay);
    gallery.appendChild(item);

    item.addEventListener('click', () => openLightbox(i));
  });

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');

  function openLightbox(i) {
    currentIndex = i;
    lightboxImg.src = images[i].src;
    lightboxImg.alt = images[i].alt;
    lightbox.classList.add('show');
  }

  function closeLightbox() {
    lightbox.classList.remove('show');
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', prevImage);
  lightboxNext.addEventListener('click', nextImage);
  lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target === lightboxImg) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('show')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
  });
</script>
</body>
