(() => {

  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top  = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      ring.style.width = '56px';
      ring.style.height = '56px';
      ring.style.borderColor = 'rgba(200,184,154,0.6)';
    });
    el.addEventListener('mouseleave', () => {
      ring.style.width = '36px';
      ring.style.height = '36px';
      ring.style.borderColor = 'var(--accent)';
    });
  });

  // Gallery images
  const images = [
    { src: 'img/thumb/Ricardo1.jpg', alt: 'Retrato profesional · Ricardo' },
    { src: 'img/thumb/Ricardo2.jpg', alt: 'Retrato editorial · Ricardo' },
    { src: 'img/thumb/Jona1.jpg',    alt: 'Retrato profesional · Jonathan' },
    { src: 'img/thumb/Jona3.jpg',    alt: 'Retrato corporativo · Jonathan' },
    { src: 'img/thumb/Valeria1.jpg', alt: 'Retrato profesional · Valeria' },
    { src: 'img/thumb/Mafer2.jpg',   alt: 'Retrato personal · Mafer' },
    { src: 'img/thumb/Carlos1.jpg',  alt: 'Retrato corporativo · Carlos' },
    { src: 'img/thumb/Carlos2.jpg',  alt: 'Retrato profesional · Carlos' },
    { src: 'img/thumb/Carlos3.jpg',  alt: 'Retrato editorial · Carlos' },
    { src: 'img/thumb/Mich1.jpg',    alt: 'Retrato artístico · Michelle' },
    { src: 'img/thumb/Mich4.jpg',    alt: 'Retrato personal · Michelle' },
    { src: 'img/thumb/Christian1.jpg', alt: 'Retrato profesional · Christian' },
    { src: 'img/thumb/Christian3.jpg', alt: 'Retrato editorial · Christian' },
  ];

  // Shuffle
  for (let i = images.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [images[i], images[j]] = [images[j], images[i]];
  }

const gallery = document.getElementById('gallery');
  const thumbPath = p => p;
  let currentIndex = 0;

  images.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';

    const el = document.createElement('img');
    el.src = thumbPath(img.src);
    el.onerror = () => { el.src = img.src; };
    el.alt = img.alt;
    el.loading = 'lazy';

    const overlay = document.createElement('div');
    overlay.className = 'gallery-item-overlay';
    const label = document.createElement('span');
    label.className = 'gallery-item-label';
    label.textContent = img.alt;
    overlay.appendChild(label);

    item.appendChild(el);
    item.appendChild(overlay);
    gallery.appendChild(item);

    item.addEventListener('click', () => openLightbox(i));
  });

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');

  function openLightbox(i) {
    currentIndex = i;
    lightboxImg.src = images[i].src;
    lightboxImg.alt = images[i].alt;
    lightbox.classList.add('show');
  }

  function closeLightbox() {
    lightbox.classList.remove('show');
  }

  function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  lightboxClose.addEventListener('click', closeLightbox);
  lightboxPrev.addEventListener('click', prevImage);
  lightboxNext.addEventListener('click', nextImage);
  lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target === lightboxImg) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('show')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
  });

})();

    });
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Sticky gallery
  (function () {
    const wrapper  = document.getElementById('galeriaWrapper');
    if (!wrapper) return;
    const slides   = wrapper.querySelectorAll('.galeria-slide');
    const contents = wrapper.querySelectorAll('.galeria-slide-content');
    const fill     = document.getElementById('galeriaFill');
    const count    = document.getElementById('galeriaCount');
    const N        = slides.length;
    // Each slide gets exactly 1/N of the scroll range
    const SLOT     = 1 / N;

    function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
    function map(v, a, b)   { return clamp((v - a) / (b - a), 0, 1); }
    function easeOut(t)     { return 1 - (1 - t) * (1 - t) * (1 - t); }  // power3.out
    function easeInOut(t)   { return t < 0.5 ? 4*t*t*t : 1 - (-2*t+2)**3/2; }

    function update() {
      const scrolled = -wrapper.getBoundingClientRect().top;
      const total    = wrapper.offsetHeight - window.innerHeight;
      // Don't bail at scrolled==0 — we need to set initial CSS vars
      if (total <= 0) return;

      const p = clamp(scrolled / total, 0, 1);

      slides.forEach((slide, d) => {
        const m   = d * SLOT;
        const end = m + SLOT;

        // spIn: 0→1 during this slide's entry slot
        const spIn  = d === 0 ? 1 : easeOut(map(p, m, end));

        // spOut: starts right when the next slide begins arriving,
        //        fully exits by the time the next slide is fully in.
        //        Range: [end, end + SLOT] — a full slot to exit cleanly.
        const spOut = d < N - 1 ? easeOut(map(p, end, end + SLOT)) : 0;

        slide.style.setProperty('--sp-in',  spIn);
        slide.style.setProperty('--sp-out', spOut);

        // Dynamic z-index: the entering slide rises above the exiting one.
        // Fully exited slides drop to z=0 so they never ghost above anything.
        if (spOut >= 0.999) {
          slide.style.zIndex = 0;
        } else if (spIn > 0) {
          // Incoming slide gets a z proportional to how far it has entered
          // (higher than any exiting slide's z)
          slide.style.zIndex = d + 1 + Math.round(spIn * 10);
        } else {
          slide.style.zIndex = d + 1;
        }

        // Text: fades in once mostly arrived, fades out as it begins leaving
        const fadeIn  = clamp((spIn  - 0.6) / 0.3, 0, 1);
        const fadeOut = clamp(1 - spOut / 0.4,      0, 1);
        const opacity = easeInOut(fadeIn) * fadeOut;
        contents[d].style.opacity    = opacity;
        contents[d].style.visibility = opacity > 0.01 ? 'visible' : 'hidden';
      });

      const active = Math.min(N - 1, Math.floor(p * N));
      if (fill)  fill.style.width  = `${((active + 1) / N) * 100}%`;
      if (count) count.textContent = `0${active + 1} / 0${N}`;
    }

    let rafPending = false;
    window.addEventListener('scroll', () => {
      if (rafPending) return;
      rafPending = true;
      requestAnimationFrame(() => { update(); rafPending = false; });
    }, { passive: true });

    // Run once immediately to set correct initial state
    update();
  })();

  // Duplicate marquee items for seamless infinite loop
  document.querySelectorAll('.marquee-track').forEach(track => {
    const clone = track.innerHTML;
    track.insertAdjacentHTML('beforeend', clone.replace(/id="[^"]*"/g, '').replace(/<img /g, '<img aria-hidden="true" '));
  });
